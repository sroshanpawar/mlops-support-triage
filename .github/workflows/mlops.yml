# ─────────────────────────────────────────────────────────────────────────────
# MLOps CI/CD Pipeline
# Runs tests, trains model, and builds Docker image on push
# ─────────────────────────────────────────────────────────────────────────────

name: MLOps CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  DOCKER_IMAGE_NAME: "support-triage-system"

jobs:
  # ── Job 1: Lint & Test ─────────────────────────────────────────────────────
  test:
    name: 🧪 Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🏋️ Train model
        run: python training/train.py

      - name: 🧪 Run pytest
        run: |
          pytest tests/ -v --tb=short --junitxml=test-results.xml

      - name: 📊 Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

  # ── Job 2: Train & Validate Model ─────────────────────────────────────────
  train:
    name: 🤖 Train & Validate Model
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🏋️ Train model with MLflow tracking
        run: python training/train.py

      - name: ✅ Verify model artifacts
        run: |
          echo "Checking model file exists..."
          test -f models/intent_classifier.joblib && echo "✅ Model artifact found" || (echo "❌ Model artifact missing" && exit 1)

          echo "Checking MLflow runs..."
          test -d mlruns && echo "✅ MLflow runs directory found" || (echo "❌ MLflow directory missing" && exit 1)

      - name: 📦 Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: |
            models/intent_classifier.joblib
          retention-days: 30

      - name: 📦 Upload MLflow runs
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-runs
          path: mlruns/
          retention-days: 30

  # ── Job 3: Build Docker Image ──────────────────────────────────────────────
  docker:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, train]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📥 Download trained model
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: models/

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: false
          tags: |
            ${{ env.DOCKER_IMAGE_NAME }}:latest
            ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ✅ Verify Docker image
        run: |
          docker images | grep ${{ env.DOCKER_IMAGE_NAME }}
          echo "✅ Docker image built successfully"
