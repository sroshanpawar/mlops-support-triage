version: "3.9"

services:
  # ── Full Application Stack ──────────────────────────────────────────────
  app:
    build:
      context: .
      target: production
    container_name: support-triage-system
    ports:
      - "8000:8000"   # FastAPI Backend
      - "8501:8501"   # Streamlit Dashboard
    volumes:
      - ./models:/app/models           # Persist trained models
      - ./mlruns:/app/mlruns           # Persist MLflow runs
      - sqlite_data:/app/data_db       # Persist SQLite database
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── MLflow UI (optional) ────────────────────────────────────────────────
  mlflow:
    build:
      context: .
      target: dependencies
    container_name: mlflow-ui
    command: >
      mlflow ui
      --host 0.0.0.0
      --port 5000
      --backend-store-uri file:///app/mlruns
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/app/mlruns
    restart: unless-stopped

volumes:
  sqlite_data:
